<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no"/>
  <meta name="mobile-web-app-capable" content="yes"/>
  <meta name="apple-mobile-web-app-capable" content="yes"/>
  <meta name="apple-mobile-web-app-status-bar-style" content="black"/>
  <meta name="theme-color" content="#0A0F1E"/>
  <title>JuicePlus POS</title>
  <link rel="manifest" href="/manifest.json"/>
  <script src="https://epson.com/Files/epos-2.27.0.js" crossorigin="anonymous"
    onerror="console.warn('Epson SDK not loaded - browser print fallback active')">
  </script>
  <style>
    *, *::before, *::after { margin:0; padding:0; box-sizing:border-box; }
    html, body, #root { width:100%; height:100%; overflow:hidden; background:#0A0F1E;
      font-family:-apple-system,'SF Pro Display','Helvetica Neue',Arial,sans-serif;
      -webkit-tap-highlight-color:transparent; -webkit-touch-callout:none; }
    body { overscroll-behavior:none; }
    #root { display:flex; flex-direction:column; }
    ::-webkit-scrollbar { width:4px; height:4px; }
    ::-webkit-scrollbar-track { background:transparent; }
    ::-webkit-scrollbar-thumb { background:#334155; border-radius:2px; }
  </style>
</head>
<body><div id="root"></div></body>
</html>
